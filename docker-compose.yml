version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=ErrandsManagementDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true;
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=ErrandsManagement
      - JwtSettings__Audience=ErrandsManagement
      - JwtSettings__ExpiryMinutes=15
      - JwtSettings__RefreshTokenDays=7
      - Cors__AllowedOrigins__0=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/wwwroot/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -No -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

volumes:
  sql_data:
  uploads_data: